services:
  # ── FastAPI Backend ────────────────────────────────────────────────────────
  - type: web
    name: png-monitor-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: MONGODB_URI
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: https://png-monitor-web.onrender.com
      - key: SCRAPE_INTERVAL_MINUTES
        value: "60"
    healthCheckPath: /health
    plan: free

  # ── React Frontend (Static Site) ──────────────────────────────────────────
  - type: web
    name: png-monitor-web
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./build
    envVars:
      - key: REACT_APP_API_URL
        fromService:
          name: png-monitor-api
          type: web
          property: host
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    plan: free
